<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — COP Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- TipTap via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/core@2.4.0/dist/tiptap-core.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2.4.0/dist/tiptap-starter-kit.umd.min.js"></script>
  <style>
    /* Editor */
    .ProseMirror{outline:none;min-height:320px;padding:1rem;font-size:.95rem;line-height:1.8;color:#2C2C2C}
    .ProseMirror p{margin-bottom:.8rem}
    .ProseMirror h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;margin:1.5rem 0 .5rem;color:#1A1A1A}
    .ProseMirror ul{list-style:disc;padding-left:1.4rem;margin:.6rem 0 1.2rem}
    .ProseMirror li{margin:.3rem 0;color:#555}
    .ProseMirror strong{color:#1A1A1A;font-weight:600}
    .ProseMirror blockquote{border-left:3px solid #C8102E;padding:.8rem 1.2rem;background:#F9F9F9;margin:1.2rem 0;border-radius:0 2px 2px 0;font-style:italic;color:#444}
    .ProseMirror.ProseMirror-focused{outline:none}
    .tiptap-btn{padding:.3rem .6rem;border-radius:4px;font-size:.8rem;font-weight:600;transition:all .2s;border:1px solid #e5e7eb;color:#555;background:#fff;cursor:pointer}
    .tiptap-btn:hover{background:#f3f4f6}
    .tiptap-btn.is-active{background:#C8102E;color:#fff;border-color:#C8102E}

    /* Toast */
    #toast{transition:opacity .3s,transform .3s}

    /* Overlay */
    #editor-overlay{display:none}
    #editor-overlay.open{display:flex}

    /* Drag & Drop */
    #drop-zone.dragover{border-color:#C8102E;background:#fff5f5}
  </style>
</head>
<body class="font-sans bg-[#F7F7F5] min-h-screen text-[#2C2C2C]">

<!-- ── LOGIN ── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-10">
      <div class="font-serif text-4xl font-bold text-[#1A1A1A] mb-1">COP<span class="text-[#C8102E]">.</span></div>
      <p class="text-xs tracking-[.25em] uppercase text-gray-400 font-medium">Painel Administrativo</p>
    </div>
    <div class="bg-white shadow-sm border border-gray-100 p-8">
      <p class="text-sm text-gray-500 mb-6 font-light">Entre com sua senha para gerenciar o blog.</p>
      <div class="mb-4">
        <label class="block text-xs font-semibold tracking-widest uppercase text-gray-400 mb-2">Senha</label>
        <input id="login-pw" type="password" placeholder="••••••••"
          class="w-full border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:border-[#C8102E] transition-colors"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-err" class="hidden text-xs text-[#C8102E] mb-4 font-medium"></div>
      <button onclick="doLogin()"
        class="w-full bg-[#C8102E] text-white text-xs font-bold tracking-widest uppercase py-3.5 hover:bg-[#1A1A1A] transition-colors">
        Entrar
      </button>
    </div>
  </div>
</div>

<!-- ── PAINEL ── -->
<div id="admin-panel" class="hidden min-h-screen">

  <!-- Topbar -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
      <div class="flex items-center gap-4">
        <div class="font-serif text-2xl font-bold text-[#1A1A1A]">COP<span class="text-[#C8102E]">.</span></div>
        <span class="text-gray-200">|</span>
        <span class="text-sm font-medium text-gray-500">Blog Admin</span>
      </div>
      <div class="flex items-center gap-3">
        <a href="../blog.html" target="_blank"
          class="flex items-center gap-2 text-xs font-semibold tracking-wider uppercase text-gray-400 hover:text-[#C8102E] transition-colors">
          <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Ver blog
        </a>
        <button onclick="doLogout()"
          class="flex items-center gap-2 text-xs font-semibold tracking-wider uppercase text-gray-400 hover:text-[#C8102E] transition-colors ml-4">
          <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sair
        </button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Título + botão novo -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-serif font-bold text-[#1A1A1A]">Publicações</h1>
        <p class="text-sm text-gray-400 font-light mt-1" id="posts-count">Carregando...</p>
      </div>
      <button onclick="openEditor(null)"
        class="flex items-center gap-2 bg-[#C8102E] text-white text-xs font-bold tracking-widest uppercase px-5 py-3 hover:bg-[#1A1A1A] transition-colors">
        <i data-lucide="plus" class="w-4 h-4"></i> Nova publicação
      </button>
    </div>

    <!-- Filtro rápido -->
    <div class="flex gap-2 flex-wrap mb-6" id="cat-filters">
      <button onclick="loadPosts('todos', this)"
        class="filter-btn active px-4 py-1.5 text-xs font-bold tracking-wider uppercase border border-gray-200 text-gray-500 hover:border-[#C8102E] hover:text-[#C8102E] transition-all">
        Todos
      </button>
    </div>

    <!-- Lista de posts -->
    <div id="posts-list" class="space-y-3"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20">
      <i data-lucide="file-text" class="w-10 h-10 text-gray-200 mx-auto mb-4"></i>
      <p class="text-sm text-gray-400 font-light">Nenhuma publicação ainda.</p>
      <button onclick="openEditor(null)" class="mt-4 text-xs text-[#C8102E] font-semibold hover:underline">Criar a primeira</button>
    </div>

  </main>
</div>

<!-- ── EDITOR (overlay) ── -->
<div id="editor-overlay" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm items-start justify-center overflow-y-auto py-8 px-4">
  <div class="bg-white w-full max-w-4xl shadow-2xl">

    <!-- Header do editor -->
    <div class="flex items-center justify-between px-8 py-5 border-b border-gray-100">
      <h2 id="editor-title" class="text-lg font-serif font-bold text-[#1A1A1A]">Nova publicação</h2>
      <button onclick="closeEditor()" class="text-gray-300 hover:text-[#C8102E] transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <div class="p-8 space-y-6">

      <!-- Título -->
      <div>
        <label class="block text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">Título *</label>
        <input id="f-title" type="text" placeholder="Ex: STJ decide que..."
          class="w-full border border-gray-200 px-4 py-3 text-base font-serif focus:outline-none focus:border-[#C8102E] transition-colors">
      </div>

      <!-- Categoria + Destaque -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">Categoria *</label>
          <select id="f-cat"
            class="w-full border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:border-[#C8102E] transition-colors bg-white appearance-none">
            <option value="">Selecione...</option>
            <option value="trabalhista">Trabalhista</option>
            <option value="previdenciario">Previdenciário</option>
            <option value="administrativo">Administrativo</option>
            <option value="sindical">Sindical</option>
            <option value="civel">Cível</option>
            <option value="institucional">Institucional</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">Tempo de leitura</label>
          <input id="f-read" type="text" placeholder="Ex: 5 min de leitura"
            class="w-full border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:border-[#C8102E] transition-colors">
        </div>
      </div>

      <!-- Upload de imagem -->
      <div>
        <label class="block text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">Imagem de capa *</label>
        <div id="drop-zone"
          class="border-2 border-dashed border-gray-200 p-6 text-center cursor-pointer hover:border-[#C8102E] transition-colors relative"
          onclick="document.getElementById('f-img-file').click()"
          ondragover="event.preventDefault();this.classList.add('dragover')"
          ondragleave="this.classList.remove('dragover')"
          ondrop="handleDrop(event)">
          <input id="f-img-file" type="file" accept="image/*" class="hidden" onchange="handleFileSelect(this)">
          <div id="drop-placeholder">
            <i data-lucide="image-plus" class="w-8 h-8 text-gray-300 mx-auto mb-2"></i>
            <p class="text-sm text-gray-400 font-light">Arraste ou <span class="text-[#C8102E] font-medium">clique para selecionar</span></p>
            <p class="text-xs text-gray-300 mt-1">JPG, PNG, WEBP — máx. 4MB</p>
          </div>
          <div id="img-preview" class="hidden">
            <img id="img-preview-el" src="" alt="" class="max-h-40 mx-auto object-contain rounded">
            <p id="img-preview-name" class="text-xs text-gray-400 mt-2"></p>
            <button onclick="event.stopPropagation();clearImage()"
              class="mt-2 text-xs text-[#C8102E] font-medium hover:underline">Remover</button>
          </div>
        </div>
      </div>

      <!-- Destaque -->
      <div class="flex items-center gap-3">
        <input id="f-featured" type="checkbox" class="w-4 h-4 accent-[#C8102E]">
        <label for="f-featured" class="text-sm font-medium text-gray-600 cursor-pointer">
          Destacar este post no topo do blog
        </label>
      </div>

      <!-- Editor WYSIWYG -->
      <div>
        <label class="block text-xs font-bold tracking-widest uppercase text-gray-400 mb-2">Conteúdo *</label>

        <!-- Toolbar -->
        <div class="border border-gray-200 border-b-0 bg-gray-50 px-3 py-2 flex flex-wrap gap-1.5 items-center">
          <button class="tiptap-btn font-bold" onclick="editor.chain().focus().toggleBold().run()" id="btn-bold">N</button>
          <button class="tiptap-btn italic" onclick="editor.chain().focus().toggleItalic().run()" id="btn-italic">I</button>
          <span class="text-gray-200">|</span>
          <button class="tiptap-btn text-xs" onclick="editor.chain().focus().toggleHeading({level:3}).run()" id="btn-h3">H3</button>
          <span class="text-gray-200">|</span>
          <button class="tiptap-btn" onclick="editor.chain().focus().toggleBulletList().run()" id="btn-ul">
            <i data-lucide="list" class="w-3.5 h-3.5"></i>
          </button>
          <button class="tiptap-btn" onclick="editor.chain().focus().toggleBlockquote().run()" id="btn-quote">
            <i data-lucide="quote" class="w-3.5 h-3.5"></i>
          </button>
          <span class="text-gray-200">|</span>
          <button class="tiptap-btn" onclick="editor.chain().focus().undo().run()">
            <i data-lucide="undo-2" class="w-3.5 h-3.5"></i>
          </button>
          <button class="tiptap-btn" onclick="editor.chain().focus().redo().run()">
            <i data-lucide="redo-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>

        <!-- Área de edição -->
        <div id="tiptap-editor" class="border border-gray-200 min-h-[320px] bg-white"></div>
      </div>

      <!-- Ações -->
      <div class="flex items-center justify-between pt-4 border-t border-gray-100">
        <button id="btn-delete" onclick="deletePost()" class="hidden text-xs font-semibold text-gray-400 hover:text-red-600 transition-colors flex items-center gap-1.5">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Excluir publicação
        </button>
        <div class="flex gap-3 ml-auto">
          <button onclick="closeEditor()"
            class="px-6 py-3 text-xs font-bold tracking-wider uppercase border border-gray-200 text-gray-500 hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">
            Cancelar
          </button>
          <button onclick="savePost()" id="btn-save"
            class="flex items-center gap-2 px-7 py-3 bg-[#C8102E] text-white text-xs font-bold tracking-wider uppercase hover:bg-[#1A1A1A] transition-colors">
            <i data-lucide="send" class="w-3.5 h-3.5"></i>
            <span id="btn-save-label">Publicar</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"
  class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[999] bg-[#1A1A1A] text-white text-sm font-medium px-6 py-3 shadow-xl pointer-events-none opacity-0 whitespace-nowrap"></div>

<script>
  // ─── Config ───────────────────────────────────────────────
  const API = '/api';
  const CATS = ['trabalhista','previdenciario','administrativo','sindical','civel','institucional'];
  const CAT_LABELS = {
    trabalhista:'Trabalhista', previdenciario:'Previdenciário',
    administrativo:'Administrativo', sindical:'Sindical',
    civel:'Cível', institucional:'Institucional'
  };

  let token = localStorage.getItem('cop_admin_token');
  let currentPostId = null;
  let uploadedImgUrl = null;
  let editor = null;
  let allPosts = [];

  // ─── Inicialização ────────────────────────────────────────
  if (token) showPanel();

  function showPanel() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    initEditor();
    loadPosts('todos');
    buildCatFilters();
    lucide.createIcons();
  }

  // ─── Login / Logout ───────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('login-pw').value;
    const err = document.getElementById('login-err');
    err.classList.add('hidden');
    try {
      const r = await fetch(`${API}/auth/login`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw })
      });
      if (!r.ok) throw new Error();
      const { token: t } = await r.json();
      token = t;
      localStorage.setItem('cop_admin_token', t);
      showPanel();
    } catch {
      err.textContent = 'Senha incorreta.';
      err.classList.remove('hidden');
    }
  }

  function doLogout() {
    localStorage.removeItem('cop_admin_token');
    token = null;
    location.reload();
  }

  // ─── Carregar posts ────────────────────────────────────────
  async function loadPosts(cat = 'todos', btn = null) {
    if (btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','bg-[#C8102E]','text-white','border-[#C8102E]'));
      btn.classList.add('active','bg-[#C8102E]','text-white','border-[#C8102E]');
    }
    const url = cat === 'todos' ? `${API}/posts` : `${API}/posts?cat=${cat}`;
    const r = await fetch(url, { headers:{ Authorization:`Bearer ${token}` }});
    allPosts = await r.json();

    const list = document.getElementById('posts-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (!allPosts.length) { empty.classList.remove('hidden'); lucide.createIcons(); return; }
    empty.classList.add('hidden');

    document.getElementById('posts-count').textContent =
      `${allPosts.length} publicaç${allPosts.length === 1 ? 'ão' : 'ões'}`;

    allPosts.forEach(p => {
      const el = document.createElement('div');
      el.className = 'bg-white border border-gray-100 flex items-center gap-5 p-4 hover:border-[#C8102E] transition-colors group cursor-pointer';
      el.innerHTML = `
        <img src="${p.img}" alt="" class="w-16 h-16 object-cover flex-shrink-0 rounded-sm">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-[9px] font-bold tracking-widest uppercase text-[#C8102E]">${CAT_LABELS[p.cat] || p.cat}</span>
            ${p.featured ? '<span class="text-[9px] font-bold tracking-widest uppercase bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">Destaque</span>' : ''}
          </div>
          <h3 class="font-serif text-sm font-semibold text-[#1A1A1A] line-clamp-1 group-hover:text-[#C8102E] transition-colors">${p.title}</h3>
          <p class="text-xs text-gray-400 mt-1">${p.date} · ${p.read_time}</p>
        </div>
        <button onclick="event.stopPropagation();openEditor(${p.id})"
          class="flex-shrink-0 flex items-center gap-1.5 text-xs font-semibold text-gray-400 hover:text-[#C8102E] transition-colors px-3 py-2">
          <i data-lucide="pencil" class="w-3.5 h-3.5"></i> Editar
        </button>
      `;
      el.querySelector('div.flex-1').onclick = () => openEditor(p.id);
      list.appendChild(el);
    });
    lucide.createIcons();
  }

  function buildCatFilters() {
    const wrap = document.getElementById('cat-filters');
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'filter-btn px-4 py-1.5 text-xs font-bold tracking-wider uppercase border border-gray-200 text-gray-500 hover:border-[#C8102E] hover:text-[#C8102E] transition-all';
      b.textContent = CAT_LABELS[c];
      b.onclick = () => loadPosts(c, b);
      wrap.appendChild(b);
    });
  }

  // ─── Editor TipTap ────────────────────────────────────────
  function initEditor() {
    editor = new StarterKit.StarterKit({
      element: document.getElementById('tiptap-editor'),
      extensions: [],
    });
    // Fallback simples se CDN não carregou completamente
    if (!window.StarterKit) return;
    try {
      editor = window.tiptap?.Editor
        ? new window.tiptap.Editor({
            element: document.getElementById('tiptap-editor'),
            extensions: [window.StarterKit],
            onUpdate() { updateToolbarState(); }
          })
        : null;
    } catch(e) { editor = null; }
  }

  function updateToolbarState() {
    if (!editor) return;
    document.getElementById('btn-bold').classList.toggle('is-active', editor.isActive('bold'));
    document.getElementById('btn-italic').classList.toggle('is-active', editor.isActive('italic'));
    document.getElementById('btn-h3').classList.toggle('is-active', editor.isActive('heading',{level:3}));
    document.getElementById('btn-ul').classList.toggle('is-active', editor.isActive('bulletList'));
    document.getElementById('btn-quote').classList.toggle('is-active', editor.isActive('blockquote'));
  }

  function getEditorHTML() {
    if (editor) return editor.getHTML();
    return document.getElementById('tiptap-editor').innerHTML;
  }

  function setEditorHTML(html) {
    if (editor) { editor.commands.setContent(html); return; }
    document.getElementById('tiptap-editor').innerHTML = html;
  }

  // ─── Abrir/fechar editor ──────────────────────────────────
  function openEditor(id) {
    currentPostId = id;
    clearImage();

    if (id === null) {
      // Novo post
      document.getElementById('editor-title').textContent = 'Nova publicação';
      document.getElementById('f-title').value = '';
      document.getElementById('f-cat').value = '';
      document.getElementById('f-read').value = '';
      document.getElementById('f-featured').checked = false;
      setEditorHTML('');
      document.getElementById('btn-delete').classList.add('hidden');
      document.getElementById('btn-save-label').textContent = 'Publicar';
    } else {
      // Editar post existente
      const p = allPosts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('editor-title').textContent = 'Editar publicação';
      document.getElementById('f-title').value = p.title;
      document.getElementById('f-cat').value = p.cat;
      document.getElementById('f-read').value = p.read_time;
      document.getElementById('f-featured').checked = p.featured;
      setEditorHTML(p.body);
      uploadedImgUrl = p.img;
      showImagePreview(p.img, 'imagem atual');
      document.getElementById('btn-delete').classList.remove('hidden');
      document.getElementById('btn-save-label').textContent = 'Salvar alterações';
    }

    document.getElementById('editor-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    lucide.createIcons();
  }

  function closeEditor() {
    document.getElementById('editor-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ─── Upload de imagem ─────────────────────────────────────
  function handleFileSelect(input) {
    const file = input.files[0];
    if (file) uploadFile(file);
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) uploadFile(file);
  }

  async function uploadFile(file) {
    if (file.size > 4 * 1024 * 1024) { showToast('⚠ Imagem muito grande. Máx. 4MB.'); return; }
    showToast('⏳ Enviando imagem...');
    try {
      const r = await fetch(`${API}/upload?filename=${encodeURIComponent(file.name)}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': file.type },
        body: file
      });
      const { url } = await r.json();
      uploadedImgUrl = url;
      showImagePreview(url, file.name);
      showToast('✓ Imagem enviada!');
    } catch {
      showToast('✗ Erro ao enviar imagem.');
    }
  }

  function showImagePreview(url, name) {
    document.getElementById('drop-placeholder').classList.add('hidden');
    document.getElementById('img-preview').classList.remove('hidden');
    document.getElementById('img-preview-el').src = url;
    document.getElementById('img-preview-name').textContent = name;
  }

  function clearImage() {
    uploadedImgUrl = null;
    document.getElementById('f-img-file').value = '';
    document.getElementById('drop-placeholder').classList.remove('hidden');
    document.getElementById('img-preview').classList.add('hidden');
    document.getElementById('img-preview-el').src = '';
  }

  // ─── Salvar post ──────────────────────────────────────────
  async function savePost() {
    const title = document.getElementById('f-title').value.trim();
    const cat   = document.getElementById('f-cat').value;
    const read  = document.getElementById('f-read').value.trim() || '3 min de leitura';
    const body  = getEditorHTML();
    const featured = document.getElementById('f-featured').checked;

    if (!title) { showToast('⚠ Preencha o título.'); return; }
    if (!cat)   { showToast('⚠ Selecione uma categoria.'); return; }
    if (!uploadedImgUrl) { showToast('⚠ Adicione uma imagem de capa.'); return; }
    if (!body || body === '<p></p>') { showToast('⚠ Escreva o conteúdo do post.'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Salvando...';
    lucide.createIcons();

    const payload = { title, cat, read_time: read, img: uploadedImgUrl, body, featured };

    try {
      const isEdit = currentPostId !== null;
      const r = await fetch(
        isEdit ? `${API}/posts/${currentPostId}` : `${API}/posts`,
        {
          method: isEdit ? 'PUT' : 'POST',
          headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify(payload)
        }
      );
      if (!r.ok) throw new Error();
      closeEditor();
      showToast(isEdit ? '✓ Post atualizado!' : '✓ Post publicado!');
      loadPosts('todos');
    } catch {
      showToast('✗ Erro ao salvar. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="send" class="w-3.5 h-3.5"></i> <span id="btn-save-label">Publicar</span>';
      lucide.createIcons();
    }
  }

  // ─── Deletar post ─────────────────────────────────────────
  async function deletePost() {
    if (!currentPostId) return;
    if (!confirm('Tem certeza que deseja excluir esta publicação? Esta ação não pode ser desfeita.')) return;
    await fetch(`${API}/posts/${currentPostId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    closeEditor();
    showToast('✓ Post excluído.');
    loadPosts('todos');
  }

  // ─── Toast ────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateX(-50%) translateY(6px)';
    }, 3000);
  }

  // ESC fecha editor
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditor(); });
</script>
</body>
</html>
